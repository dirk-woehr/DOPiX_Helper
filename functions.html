<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⨍ DOPiX Functions</title>
  <script src="/js/functions_data.js"></script>
  <script src="/js/functions.js"></script>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/functions.css">
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

<body>
  <h1>⨍ DOPiX Functions</h1>
  <ul id="nav">
    <li>
      <a href="/index.html">🏠 Home</a>
    </li>
  </ul>
  <div id="functionSelection">
    <select name="selector" id="selector"></select>
    <button id="btnAdd">Hinzufügen</button>
  </div>
  <div class="functionContainer"></div>
  <table>
    <tbody id="functionsTable"></tbody>
  </table>
  <template>
    <form class="funtionField">
      <div class="typeRow">
        <input type="radio" name="fieldType" id="fieldType_string">
        <label for="fieldType_string">String</label>
        <input type="radio" name="fieldType" id="fieldType_param">
        <label for="fieldType_param">Parameter</label>
        <input type="radio" name="fieldType" id="fieldType_plain">
        <label for="fieldType_param">Zahl / Funktion</label>
      </div>
      <input type="text" name="fieldValue" id="fieldValue">
    </form>
  </template>
</body>

</html>
