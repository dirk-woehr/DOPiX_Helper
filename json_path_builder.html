<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/xpath_builder.css">
  <script src="/js/global_functions.js"></script>
  <script src="/js/json_path_builder.js"></script>
  <title>🔗 JSON Path Builder</title>
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

</head>
<body>
  <h1>🔗 JSON Path Builder</h1>
  <ul id="nav">
    <li>
      <a href="/index.html">🏠 Home</a>
    </li>
  </ul>
  <div class="mainContainer">
    <div class="fileInputContainer">
      <label for="fileInput">Testfall wählen</label>
      <input type="file" id="fileInput" />
    </div>
    <div class="varContainer">
      <div class="varPathContainer">
        <input type="text" class="variablePath" placeholder="Pfad zur Variable">
        <span id="ogAdd">⊕</span>
      </div>
      <pre class="jsonPathValue"></pre>
    </div>
    <button id="btnBuild">JSON Paths auslesen</button>
  </div>

  <template id="rowTemplate">
    <div class="varContainer">
      <div class="varPathContainer">
        <input type="text" class="variablePath" placeholder="Pfad zur Variable">
        <span class="btnAdd">⊕</span>
        <span class="btnRemove">⊖</span>
      </div>
      <pre class="jsonPathValue"></pre>
    </div>
  </template>

</body>
</html>
