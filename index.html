    .mainGrid {
        display: grid;

    .subGrid {
      grid-column: 1 / 4;
      display: grid;
      grid-row: span 3;
      grid-template-areas:
        "topLeft topCent topRight"
        "midLeft midCent midRight"
        "botLeft botCent botRight";
      grid-template-columns: subgrid;
      grid-template-rows: subgrid;

        padding: 20px;

    .topLeft {

    .botCent {

    }
    .botRight {
