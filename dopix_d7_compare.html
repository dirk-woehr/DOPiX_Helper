<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dopix_d7_compare.css">
  <script src="/js/global_functions.js"></script>
  <script src="/js/dopix_d7_compare.js"></script>
  <title>⇄ DOPiX-/D7-Abgleich</title>
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

</head>
<body>
  <h1>⇄ DOPiX-/D7-Abgleich</h1>
  <ul id="nav">
    <li>
      <a href="/index.html">🏠 Home</a>
    </li>
  </ul>
  <div class="mainContainer">
    <div>      
      <label for="fileInputD7">D7-Export wählen</label>
      <input type="file" id="fileInputD7" />
    </div>
    <div>
      <label for="fileInputDOPiX">DOPiX-Export wählen</label>
      <input type="file" id="fileInputDOPiX" />
    </div>
    <button id="btnCompare">Vergleichen</button>
    <input type="checkbox" name="dopixInfo" id="dopixInfo">
    <input type="checkbox" name="dopixApplication" id="dopixApplication">
    <input type="checkbox" name="genericObject" id="genericObject">
    <input type="checkbox" name="d7documenttype" id="d7documenttype">
    <input type="checkbox" name="d7frameelement" id="d7frameelement">
    <input type="checkbox" name="d7pagedefinition" id="d7pagedefinition">
    <input type="checkbox" name="d7presentation" id="d7presentation">
    <input type="checkbox" name="d7style" id="d7style">
    <input type="checkbox" name="d7subtemplate" id="d7subtemplate">
    <input type="checkbox" name="d7variable" id="d7variable">
    <div class="objectFilter">
      <label for="dopixInfo" class="dopixInfo">
        <span>DOPiX-Info</span>
      </label>
      <label for="dopixApplication" class="dopixApplication">
        <span>DOPiX-Applikation</span>
      </label>
      <label for="genericObject" class="genericObject">
        <span>Allgemeine Objekte</span>
      </label>
      <label for="d7documenttype" class="d7documenttype">
        <span>D7-Documenttyp</span>
      </label>
      <label for="d7frameelement" class="d7frameelement">
        <span>D7-Frameelement</span>
      </label>
      <label for="d7pagedefinition" class="d7pagedefinition">
        <span>D7-Seitendefinition</span>
      </label>
      <label for="d7presentation" class="d7presentation">
        <span>D7-Präsentation</span>
      </label>
      <label for="d7style" class="d7style">
        <span>D7-Style</span>
      </label>
      <label for="d7subtemplate" class="d7subtemplate">
        <span>D7-Subtemplate</span>
      </label>
      <label for="d7variable" class="d7variable">
        <span>D7-Variable</span>
      </label>
    </div>
    <table id="d7table">
    </table>
  </div>
  <dialog id="errorDialog">
    <h2></h2>
    <p></p>
    <button id="btnCloseError">Schließen</button>
  </dialog>
</body>
</html>
